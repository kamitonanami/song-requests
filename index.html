<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Song Requests</title>
<style>
*{box-sizing:border-box}
:root{
  --bg:#0c0814;--card:#1c1827;--card2:#2d2450;--text:#fff;--muted:#d9cff7;
  --purple:#b983ff;--pink:#ff8fd6;--blue:#85e8ff;--gold:#ffd166;
}
body{
  margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--text);
  background:
    radial-gradient(circle at 10% 10%,#5c3dab66,transparent 30%),
    radial-gradient(circle at 90% 0%,#ff8fd655,transparent 25%),
    linear-gradient(180deg,#0c0814,#151020 55%,#09070f);
  min-height:100vh;
}
main{max-width:1050px;margin:0 auto;padding:22px}
.hero{
  position:relative;overflow:hidden;border-radius:30px;padding:34px;margin:18px 0 18px;
  background:linear-gradient(135deg,#7b5cff,#ff8fd6);
  box-shadow:0 22px 60px #0009;
}
.hero:after{
  content:"♪ ♫ ✦ ♡";position:absolute;right:25px;top:20px;font-size:72px;opacity:.18;letter-spacing:10px;
}
h1{font-size:clamp(42px,8vw,78px);line-height:.95;margin:0 0 14px;text-shadow:0 5px 20px #0005}
.hero p{font-size:22px;margin:0}
.controls{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin:16px 0}
input,select{
  width:100%;border:0;border-radius:18px;padding:16px 18px;font-size:17px;
  background:#ffffff;color:#17121f;outline:3px solid transparent;
}
input:focus,select:focus{outline-color:var(--gold)}
.stats{font-size:20px;color:var(--muted);margin:14px 4px}
.layout{display:grid;grid-template-columns:1.25fr .85fr;gap:18px;align-items:start}
#list{display:grid;gap:12px}
.song{
  border:0;width:100%;text-align:left;color:white;cursor:pointer;
  background:linear-gradient(135deg,#2d2450,#382d68);
  border-radius:22px;padding:14px;display:grid;grid-template-columns:70px 1fr auto;gap:14px;align-items:center;
  box-shadow:0 10px 25px #0006;transition:.15s ease;
}
.song:hover{transform:translateY(-2px);background:linear-gradient(135deg,#3d3271,#51408f)}
.cover{
  width:70px;height:70px;border-radius:18px;display:grid;place-items:center;font-size:31px;
  background:linear-gradient(135deg,var(--purple),var(--pink));box-shadow:inset 0 0 24px #ffffff3d;
}
.title{font-size:19px;font-weight:800}
.meta{margin-top:5px;color:var(--muted);font-size:15px}
.pill{display:inline-block;margin:5px 5px 0 0;padding:5px 9px;border-radius:999px;background:#ffffff17;color:#fff;font-size:13px}
.duration{font-weight:800;color:#ffe6f6;white-space:nowrap}
#detail{
  position:sticky;top:16px;background:linear-gradient(135deg,#211b35,#171220);
  border:1px solid #ffffff18;border-radius:28px;padding:22px;min-height:330px;box-shadow:0 18px 45px #0008;
}
.detail-cover{
  width:100%;height:150px;border-radius:24px;display:grid;place-items:center;font-size:62px;margin-bottom:16px;
  background:linear-gradient(135deg,#b983ff,#ff8fd6,#85e8ff);
}
#detail h2{margin:0 0 8px;color:#ffd5f0;font-size:30px}
.copyBtn,.favBtn{
  width:100%;border:0;border-radius:16px;padding:14px;margin-top:10px;font-size:16px;font-weight:800;cursor:pointer;color:white;
}
.copyBtn{background:linear-gradient(135deg,#8d6cff,#ff8fd6)}
.favBtn{background:#ffffff1f}
.toast{
 position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#191326;border:1px solid #ffffff33;
 padding:14px 18px;border-radius:999px;box-shadow:0 8px 28px #0009;display:none;z-index:10;
}
.empty{padding:25px;border-radius:18px;background:#ffffff12;text-align:center;color:var(--muted)}
@media(max-width:820px){
 main{padding:14px}.controls,.layout{grid-template-columns:1fr}#detail{position:static}
 .song{grid-template-columns:56px 1fr}.cover{width:56px;height:56px;border-radius:14px}.duration{grid-column:2}
}
</style>
</head>
<body>
<main>
<section class="hero">
<h1>🎤 Song Requests</h1>
<p>Choose a song, copy the request, and paste it into Twitch chat 💜</p>
</section>

<section class="controls">
<input id="search" placeholder="Search song or artist...">
<select id="difficulty">
<option value="">All difficulties</option>
<option>Easy</option>
<option>Medium</option>
<option>Hard</option>
</select>
<select id="sort">
<option value="az">Sort A–Z</option>
<option value="fav">Favorites first</option>
<option value="difficulty">Sort by difficulty</option>
<option value="duration">Sort by duration</option>
</select>
</section>

<p id="count" class="stats"></p>

<section class="layout">
<div id="list"></div>
<aside id="detail">
<div class="detail-cover">🦊🎵</div>
<h2>Song details</h2>
<p>Click a song to see details and copy the Twitch request command.</p>
</aside>
</section>
</main>
<div id="toast" class="toast"></div>

ty": "Easy", "duration": "3:31"}];
const list = document.getElementById('list');
const search = document.getElementById('search');
const difficulty = document.getElementById('difficulty');
const sort = document.getElementById('sort');
const count = document.getElementById('count');
const detail = document.getElementById('detail');
const toast = document.getElementById('toast');
let favorites = JSON.parse(localStorage.getItem('song_favorites') || '[]');
const rank = {Easy:1, Medium:2, Hard:3};
const icons = ['🎤','🎧','🎵','💜','✨','🌙','🦊','🎼','⭐','💿'];

function isFav(id){return favorites.includes(id)}
function saveFav(){localStorage.setItem('song_favorites', JSON.stringify(favorites))}
function durationToSeconds(d){const p=d.split(':').map(Number); return p[0]*60+p[1];}
function iconFor(song){return icons[song.id % icons.length];}

function showToast(text){
  toast.textContent = text;
  toast.style.display = 'block';
  setTimeout(()=>toast.style.display='none', 2200);
}

function toggleFav(id){
  favorites = isFav(id) ? favorites.filter(x=>x!==id) : [...favorites,id];
  saveFav();
  render();
  const s = songs.find(x=>x.id===id);
  if(s) showDetail(s);
}

function copyRequest(song){
  const text = '!sr ' + song.title + ' - ' + song.artist;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast('Copied: ' + text));
  } else {
    prompt('Copy this request:', text);
  }
}

function filtered(){
  const q = search.value.toLowerCase().trim();
  let data = songs.filter(s =>
    (!difficulty.value || s.difficulty === difficulty.value) &&
    (s.title + ' ' + s.artist + ' ' + s.difficulty + ' ' + s.duration).toLowerCase().includes(q)
  );

  if(sort.value === 'fav') data.sort((a,b)=>Number(isFav(b.id))-Number(isFav(a.id)) || a.title.localeCompare(b.title));
  else if(sort.value === 'difficulty') data.sort((a,b)=>rank[a.difficulty]-rank[b.difficulty] || a.title.localeCompare(b.title));
  else if(sort.value === 'duration') data.sort((a,b)=>durationToSeconds(a.duration)-durationToSeconds(b.duration));
  else data.sort((a,b)=>a.title.localeCompare(b.title));

  return data;
}

function render(){
  const data = filtered();
  count.textContent = data.length + ' / ' + songs.length + ' songs';
  list.innerHTML = '';
  if(!data.length){
    list.innerHTML = '<div class="empty">No songs found.</div>';
    return;
  }
  data.forEach(s=>{
    const div = document.createElement('button');
    div.className = 'song';
    div.innerHTML = `
      <div class="cover">${iconFor(s)}</div>
      <div>
        <div class="title">${isFav(s.id) ? '⭐ ' : '☆ '}${s.title}</div>
        <div class="meta">${s.artist}</div>
        <span class="pill">${s.difficulty}</span><span class="pill">⏱ ${s.duration}</span>
      </div>
      <div class="duration">${s.duration}</div>
    `;
    div.onclick = () => showDetail(s);
    list.appendChild(div);
  });
}

function showDetail(s){
  detail.innerHTML = `
    <div class="detail-cover">${iconFor(s)}</div>
    <h2>${s.title}</h2>
    <p><b>Artist:</b> ${s.artist}</p>
    <p><b>Difficulty:</b> ${s.difficulty}</p>
    <p><b>Duration:</b> ${s.duration}</p>
    <p><b>Twitch command:</b><br><code>!sr ${s.title} - ${s.artist}</code></p>
    <button class="copyBtn" onclick='copyRequest(${JSON.stringify(s)})'>📋 Copy Request</button>
    <button class="favBtn" onclick="toggleFav(${s.id})">${isFav(s.id) ? '⭐ Remove from favorites' : '☆ Add to favorites'}</button>
  `;
}

search.addEventListener('input', render);
difficulty.addEventListener('change', render);
sort.addEventListener('change', render);
window.copyRequest = copyRequest;
window.toggleFav = toggleFav;
render();
</script>
</body>
</html>
